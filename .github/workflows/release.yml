name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history + tags to compute the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish and zip (x64, arm64, x86)
        shell: pwsh
        run: |
          foreach ($rid in 'win-x64','win-arm64','win-x86') {
            dotnet publish src/InterviewRecorder.App/InterviewRecorder.App.csproj -c Release -r $rid --self-contained -o "publish/$rid"
            if ($LASTEXITCODE -ne 0) { throw "publish failed for $rid" }
            Compress-Archive -Path "publish/$rid/*" -DestinationPath "InterviewRecorder-$rid.zip" -Force
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: InterviewRecorder-*.zip
          generate_release_notes: true
